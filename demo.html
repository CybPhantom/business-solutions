<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhantomOps — Complete ERP Demo | CybPhantom</title>
<meta name="description" content="PhantomOps is CybPhantom's safe, interactive ERP showcase for fleet, trips, maintenance, fuel, role controls, reporting, and audit. All records are synthetic and contain no employee identities.">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0a0e1a">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none'; upgrade-insecure-requests">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e1a;--bg2:#111827;--bg3:#1f2937;
  --sidebar:#070b14;--sidebar-w:270px;
  --card:#111827;--card2:#1a2236;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
  --text:#f0f4ff;--text2:#c5cee0;--muted:#5a6a8a;
  --accent:#6366f1;--accent2:#818cf8;--accent-bg:rgba(99,102,241,.1);
  --green:#10b981;--green2:#34d399;--green-bg:rgba(16,185,129,.08);
  --gold:#f59e0b;--gold2:#fbbf24;--gold-bg:rgba(245,158,11,.08);
  --red:#ef4444;--red2:#f87171;--red-bg:rgba(239,68,68,.08);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.08);
  --cyan:#22d3ee;--cyan-bg:rgba(34,211,238,.08);
  --radius:14px;--radius-sm:10px;
  --header-h:60px;
  --glow:0 0 40px rgba(99,102,241,.15);
  --card-glow:0 8px 32px rgba(0,0,0,.3),0 0 0 1px var(--border);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Tajawal','Inter',system-ui,sans-serif;line-height:1.6;overflow-x:hidden;min-height:100vh}

/* ═══ ANIMATED BG ═══ */
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(99,102,241,.08),transparent),
    radial-gradient(ellipse 60% 40% at 80% 100%,rgba(16,185,129,.06),transparent),
    radial-gradient(ellipse 40% 30% at 50% 50%,rgba(245,158,11,.03),transparent)}

/* ═══ LAYOUT ═══ */
.app{display:flex;min-height:100vh;position:relative;z-index:1}
.sidebar{position:fixed;inset-block:0;inset-inline-start:0;width:var(--sidebar-w);
  background:linear-gradient(180deg,var(--sidebar),rgba(7,11,20,.98));
  border-inline-end:1px solid var(--border);z-index:50;display:flex;flex-direction:column;
  transition:transform .35s cubic-bezier(.4,0,.2,1);overflow-y:auto;overflow-x:hidden;
  backdrop-filter:blur(20px)}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
.main{margin-inline-start:var(--sidebar-w);flex:1;min-width:0;display:flex;flex-direction:column}
.header{height:var(--header-h);background:rgba(10,14,26,.85);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;position:sticky;top:0;z-index:40}
.content{flex:1;padding:28px;overflow-y:auto}

/* ═══ SIDEBAR ═══ */
.sb-logo{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.sb-logo-icon{width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,var(--accent),var(--cyan));
  display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:900;color:#fff;flex-shrink:0;
  box-shadow:0 4px 20px rgba(99,102,241,.4);animation:logoPulse 3s ease-in-out infinite}
@keyframes logoPulse{0%,100%{box-shadow:0 4px 20px rgba(99,102,241,.4)}50%{box-shadow:0 4px 30px rgba(99,102,241,.6)}}
.sb-logo-text{font-size:.95rem;font-weight:800;color:var(--text);line-height:1.2}
.sb-logo-text small{display:block;font-size:.68rem;font-weight:500;color:var(--muted)}

.sb-section{padding:16px 14px 6px}
.sb-section-title{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--muted);padding:0 10px;margin-bottom:8px}
.sb-nav{list-style:none;display:flex;flex-direction:column;gap:2px}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);
  cursor:pointer;font-size:.84rem;font-weight:600;color:var(--text2);transition:all .25s ease;
  border:1px solid transparent;user-select:none;position:relative;overflow:hidden}
.sb-item::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .25s;
  background:linear-gradient(90deg,rgba(99,102,241,.12),transparent)}
.sb-item:hover::before{opacity:1}
.sb-item:hover{color:var(--text);border-color:rgba(99,102,241,.15)}
.sb-item.active{color:var(--accent2);border-color:rgba(99,102,241,.3);background:rgba(99,102,241,.08)}
.sb-item.active::after{content:'';position:absolute;inset-inline-start:0;top:20%;bottom:20%;width:3px;
  background:var(--accent);border-radius:0 3px 3px 0}
.sb-item .icon{font-size:1.15rem;width:24px;text-align:center;flex-shrink:0}
.sb-item .badge{margin-inline-start:auto;background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff;
  font-size:.6rem;font-weight:800;padding:2px 8px;border-radius:100px;min-width:22px;text-align:center}

.sb-platform{padding:14px}
.sb-platform-title{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--muted);padding:0 10px;margin-bottom:10px}
.sb-plat-btn{display:flex;align-items:center;gap:10px;width:100%;padding:12px 14px;border-radius:var(--radius-sm);
  cursor:pointer;font-size:.84rem;font-weight:700;color:var(--text2);transition:all .25s;
  border:1px solid var(--border);background:transparent;font-family:inherit;text-align:inherit;margin-bottom:6px;
  position:relative;overflow:hidden}
.sb-plat-btn::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;
  background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(34,211,238,.05))}
.sb-plat-btn:hover::before{opacity:1}
.sb-plat-btn:hover{border-color:var(--accent);color:var(--text)}
.sb-plat-btn.active{border-color:var(--accent);color:var(--accent2);
  background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(34,211,238,.03));
  box-shadow:0 0 20px rgba(99,102,241,.1)}
.sb-plat-btn .plat-icon{font-size:1.3rem}
.sb-bottom{margin-top:auto;padding:14px;border-top:1px solid var(--border)}

/* ═══ HEADER ═══ */
.header-start{display:flex;align-items:center;gap:14px}
.menu-toggle{display:none;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:var(--accent2);
  width:38px;height:38px;border-radius:var(--radius-sm);cursor:pointer;font-size:1.1rem}
.header-title{font-size:1rem;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-end{display:flex;align-items:center;gap:10px}
.header-btn{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text2);
  padding:7px 16px;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;
  font-size:.78rem;font-weight:700;transition:all .25s;display:flex;align-items:center;gap:6px}
.header-btn:hover{border-color:var(--accent);color:var(--accent2);background:var(--accent-bg)}
.header-user{display:flex;align-items:center;gap:8px;font-size:.82rem;font-weight:600}
.header-avatar{width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--purple));
  display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;color:#fff;
  box-shadow:0 2px 12px rgba(99,102,241,.3)}

/* ═══ DEMO BANNER ═══ */
.demo-banner{background:linear-gradient(135deg,rgba(239,68,68,.08),rgba(245,158,11,.05));
  border:1px solid rgba(239,68,68,.2);border-radius:var(--radius);padding:14px 20px;
  font-size:.82rem;font-weight:600;color:var(--gold2);margin-bottom:24px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  backdrop-filter:blur(10px)}
.demo-banner a{color:var(--accent2);text-decoration:none;font-weight:700;margin-inline-start:auto;
  padding:6px 16px;border:1px solid var(--accent);border-radius:100px;font-size:.76rem;transition:all .25s}
.demo-banner a:hover{background:var(--accent);color:#fff}

/* ═══ STAT CARDS ═══ */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;
  transition:all .3s ease;position:relative;overflow:hidden;cursor:default;
  backdrop-filter:blur(10px)}
.stat-card::before{content:'';position:absolute;top:0;inset-inline:0;height:3px;transition:height .3s}
.stat-card:hover{transform:translateY(-4px);box-shadow:var(--glow);border-color:var(--border2)}
.stat-card:hover::before{height:4px}
.stat-card.blue::before{background:linear-gradient(90deg,var(--accent),var(--cyan))}
.stat-card.green::before{background:linear-gradient(90deg,var(--green),var(--cyan))}
.stat-card.gold::before{background:linear-gradient(90deg,var(--gold),#fb923c)}
.stat-card.purple::before{background:linear-gradient(90deg,var(--purple),var(--accent))}
.stat-card.red::before{background:linear-gradient(90deg,var(--red),var(--gold))}
.stat-card.cyan::before{background:linear-gradient(90deg,var(--cyan),var(--green))}
.stat-icon{font-size:1.6rem;margin-bottom:8px;display:block}
.stat-label{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.stat-value{font-size:2rem;font-weight:900;font-family:'Inter',sans-serif;line-height:1}
.stat-card.blue .stat-value{background:linear-gradient(135deg,var(--accent2),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-card.green .stat-value{background:linear-gradient(135deg,var(--green2),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-card.gold .stat-value{background:linear-gradient(135deg,var(--gold2),#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-card.purple .stat-value{background:linear-gradient(135deg,var(--purple),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-card.red .stat-value{color:var(--red2)}
.stat-card.cyan .stat-value{background:linear-gradient(135deg,var(--cyan),var(--green2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-change{font-size:.72rem;font-weight:700;margin-top:8px;display:flex;align-items:center;gap:4px}
.stat-change.up{color:var(--green2)}
.stat-change.down{color:var(--red2)}

/* ═══ GLASS CARD ═══ */
.glass{background:rgba(17,24,39,.6);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);
  border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--card-glow)}

/* ═══ TABLE ═══ */
.table-card{border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.table-title{font-size:1rem;font-weight:800;display:flex;align-items:center;gap:8px}
.table-actions{display:flex;gap:8px;flex-wrap:wrap}
.search-box{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);padding:8px 16px;
  border-radius:100px;font-family:inherit;font-size:.8rem;width:220px;transition:all .25s}
.search-box:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:100px;
  font-family:inherit;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .25s;border:1px solid}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--purple));border-color:transparent;color:#fff;
  box-shadow:0 4px 16px rgba(99,102,241,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(99,102,241,.4)}
.btn-outline{background:transparent;border-color:var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent2)}
.btn-sm{padding:5px 12px;font-size:.72rem}

.data-table{width:100%;border-collapse:collapse}
.data-table th{background:rgba(255,255,255,.02);color:var(--muted);font-size:.66rem;font-weight:800;
  text-transform:uppercase;letter-spacing:1px;padding:12px 16px;text-align:start;border-bottom:1px solid var(--border)}
.data-table td{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.03);font-size:.84rem;vertical-align:middle;transition:background .15s}
.data-table tr{transition:all .15s}
.data-table tbody tr:hover td{background:rgba(99,102,241,.04)}
.data-table tr:last-child td{border-bottom:0}

.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:100px;font-size:.68rem;font-weight:700;white-space:nowrap;border:1px solid transparent}
.badge-green{background:var(--green-bg);color:var(--green2);border-color:rgba(16,185,129,.2)}
.badge-gold{background:var(--gold-bg);color:var(--gold2);border-color:rgba(245,158,11,.2)}
.badge-blue{background:var(--accent-bg);color:var(--accent2);border-color:rgba(99,102,241,.2)}
.badge-red{background:var(--red-bg);color:var(--red2);border-color:rgba(239,68,68,.2)}
.badge-purple{background:var(--purple-bg);color:var(--purple);border-color:rgba(167,139,250,.2)}
.badge-gray{background:rgba(100,116,139,.1);color:var(--muted);border-color:rgba(100,116,139,.2)}
.badge-cyan{background:var(--cyan-bg);color:var(--cyan);border-color:rgba(34,211,238,.2)}
.badge-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.badge-green .badge-dot{background:var(--green2)}
.badge-gold .badge-dot{background:var(--gold2)}
.badge-blue .badge-dot{background:var(--accent2)}
.badge-red .badge-dot{background:var(--red2)}
.badge-purple .badge-dot{background:var(--purple)}
.badge-cyan .badge-dot{background:var(--cyan)}
.table-footer{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;font-size:.74rem;color:var(--muted);border-top:1px solid var(--border)}

/* ═══ CHARTS ═══ */
.chart-card{padding:22px;margin-bottom:20px}
.chart-title{font-size:.92rem;font-weight:800;margin-bottom:16px}
.bar-chart{display:flex;align-items:flex-end;gap:10px;height:180px;padding:12px 0 0}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.bar{width:100%;border-radius:8px 8px 0 0;transition:height .8s cubic-bezier(.4,0,.2,1);min-height:4px;position:relative}
.bar:hover{filter:brightness(1.2)}
.bar.blue{background:linear-gradient(to top,var(--accent),var(--accent2))}
.bar.green{background:linear-gradient(to top,var(--green),var(--green2))}
.bar.gold{background:linear-gradient(to top,var(--gold),var(--gold2))}
.bar.purple{background:linear-gradient(to top,#7c3aed,var(--purple))}
.bar.cyan{background:linear-gradient(to top,#0891b2,var(--cyan))}
.bar-label{font-size:.64rem;color:var(--muted);font-weight:700}
.bar-value{font-size:.68rem;font-weight:800;color:var(--text2)}

.donut-chart{position:relative;width:150px;height:150px;margin:0 auto 14px}
.donut-chart svg{width:100%;height:100%;transform:rotate(-90deg)}
.donut-chart circle{fill:none;stroke-width:20;stroke-linecap:round;transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut-center .num{font-size:1.6rem;font-weight:900;font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,var(--accent2),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.donut-center .lbl{font-size:.6rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.donut-legend{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
.donut-legend-item{display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--text2);font-weight:600}
.donut-legend-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}

/* ═══ PROGRESS BAR ═══ */
.progress-row{margin-bottom:12px}
.progress-label{display:flex;justify-content:space-between;font-size:.74rem;font-weight:700;margin-bottom:5px}
.progress-label span:first-child{color:var(--text2)}
.progress-label span:last-child{color:var(--muted)}
.progress-bar{height:8px;background:rgba(255,255,255,.06);border-radius:100px;overflow:hidden}
.progress-fill{height:100%;border-radius:100px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.progress-fill.blue{background:linear-gradient(90deg,var(--accent),var(--cyan))}
.progress-fill.green{background:linear-gradient(90deg,var(--green),var(--cyan))}
.progress-fill.gold{background:linear-gradient(90deg,var(--gold),#fb923c)}
.progress-fill.purple{background:linear-gradient(90deg,var(--purple),var(--accent))}
.progress-fill.red{background:linear-gradient(90deg,var(--red),var(--gold))}

/* ═══ WORKFLOW ═══ */
.workflow-card{padding:22px;margin-bottom:20px}
.workflow-title{font-size:.92rem;font-weight:800;margin-bottom:16px}
.workflow-steps{display:flex;flex-wrap:wrap;align-items:center;gap:6px}
.wf-step{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:100px;font-size:.76rem;
  font-weight:700;border:1px solid;cursor:pointer;transition:all .3s ease}
.wf-step.done{background:var(--green-bg);border-color:rgba(16,185,129,.3);color:var(--green2)}
.wf-step.current{background:var(--accent-bg);border-color:rgba(99,102,241,.4);color:var(--accent2);
  box-shadow:0 0 0 4px rgba(99,102,241,.12);animation:wfPulse 2s ease-in-out infinite}
@keyframes wfPulse{0%,100%{box-shadow:0 0 0 4px rgba(99,102,241,.12)}50%{box-shadow:0 0 0 8px rgba(99,102,241,.06)}}
.wf-step.pending{background:transparent;border-color:var(--border);color:var(--muted)}
.wf-step .wf-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:900;flex-shrink:0}
.wf-step.done .wf-num{background:var(--green);color:#fff}
.wf-step.current .wf-num{background:var(--accent);color:#fff}
.wf-step.pending .wf-num{background:var(--bg3);color:var(--muted)}
.wf-arrow{color:var(--border2);font-size:.7rem}

/* ═══ ACTIVITY ═══ */
.activity-card{padding:22px;margin-bottom:20px}
.activity-title{font-size:.92rem;font-weight:800;margin-bottom:16px}
.activity-list{display:flex;flex-direction:column;gap:14px}
.activity-item{display:flex;gap:14px;align-items:flex-start;font-size:.82rem;padding:10px 14px;border-radius:var(--radius-sm);transition:background .15s}
.activity-item:hover{background:rgba(255,255,255,.02)}
.activity-dot{width:10px;height:10px;border-radius:50%;margin-top:5px;flex-shrink:0;box-shadow:0 0 0 3px rgba(255,255,255,.05)}
.activity-dot.blue{background:var(--accent)}
.activity-dot.green{background:var(--green)}
.activity-dot.gold{background:var(--gold)}
.activity-dot.red{background:var(--red)}
.activity-dot.purple{background:var(--purple)}
.activity-text{color:var(--text2);line-height:1.5}
.activity-text strong{color:var(--text);font-weight:700}
.activity-time{color:var(--muted);font-size:.66rem;margin-top:3px;font-weight:600}

/* ═══ MODAL ═══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:200;
  display:none;align-items:center;justify-content:center;padding:24px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;
  width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.5),var(--glow)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:1rem;font-weight:800}
.modal-close{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);
  width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{color:var(--text);border-color:var(--red);background:var(--red-bg)}
.modal-body{padding:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.78rem;font-weight:700;color:var(--muted);margin-bottom:5px}
.form-input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);
  padding:10px 16px;border-radius:var(--radius-sm);font-family:inherit;font-size:.84rem;transition:all .25s}
.form-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.15);background:rgba(99,102,241,.04)}
select.form-input{cursor:pointer}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;padding:16px 24px;border-top:1px solid var(--border)}

/* ═══ TOAST ═══ */
.toast-container{position:fixed;top:72px;inset-inline-end:24px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:14px 20px;
  font-size:.82rem;font-weight:600;box-shadow:0 12px 40px rgba(0,0,0,.4),var(--glow);
  display:flex;align-items:center;gap:10px;animation:toastIn .4s cubic-bezier(.4,0,.2,1);
  min-width:280px;backdrop-filter:blur(12px)}
.toast.success{border-color:rgba(16,185,129,.35);color:var(--green2)}
.toast.info{border-color:rgba(99,102,241,.35);color:var(--accent2)}
.toast.warning{border-color:rgba(245,158,11,.35);color:var(--gold2)}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

/* ═══ PAGE TRANSITION ═══ */
.content{animation:pageIn .35s ease}
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  .sidebar{transform:translateX(calc(var(--sidebar-w) * -1))}
  html[dir="rtl"] .sidebar{transform:translateX(var(--sidebar-w))}
  .sidebar.open{transform:translateX(0)!important}
  .main{margin-inline-start:0}
  .menu-toggle{display:flex;align-items:center;justify-content:center}
  .content{padding:16px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .two-col{grid-template-columns:1fr}
  .search-box{width:150px}
  .data-table{font-size:.76rem}
  .data-table th,.data-table td{padding:10px 12px}
  .workflow-steps{gap:3px}.wf-step{padding:7px 10px;font-size:.68rem}
  .table-header{flex-direction:column;align-items:stretch}
  .stats-grid{gap:10px}
}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:45;backdrop-filter:blur(4px)}
@media(max-width:768px){.sidebar-overlay.open{display:block}}

function sc(icon,lbl,val,clr,chg,dir){

function tc(title,hds,rows,cnt,hasAdd){
  var h='<div class="table-card glass"><div class="table-header"><div class="table-title">'+esc(title)+' <span class="badge badge-gray">'+esc(cnt)+'</span></div>';
  h+='<div class="table-actions"><input type="text" class="search-box" placeholder="'+esc(t('بحث...','Search...'))+'" data-search>';
  if(hasAdd)h+='<button type="button" class="btn btn-primary" data-add>+ '+esc(t('إضافة','Add'))+'</button>';
  h+='</div></div><div style="overflow-x:auto"><table class="data-table"><thead><tr>';
  hds.forEach(function(hd){h+='<th>'+esc(hd)+'</th>'});
  h+='</tr></thead><tbody>'+rows+'</tbody></table></div>';
  h+='<div class="table-footer"><span>'+esc(cnt)+' '+esc(t('سجل','records'))+'</span><span style="font-size:.66rem">'+esc(t('بيانات تجريبية','Demo data'))+'</span></div></div>';return h}
function bc(title,data){
  var mx=0;data.forEach(function(d){if(d.v>mx)mx=d.v});
  var h='<div class="chart-card glass"><div class="chart-title">'+esc(title)+'</div><div class="bar-chart">';
  data.forEach(function(d){var pct=mx?Math.round(d.v/mx*100):0;
    h+='<div class="bar-col"><div class="bar-value">'+esc(d.v)+'</div><div class="bar '+esc(d.c)+'" style="height:'+pct+'%"></div><div class="bar-label">'+esc(d.l)+'</div></div>'});
  h+='</div></div>';return h}
function dc(title,data){
  var tot=0;data.forEach(function(d){tot+=d.v});var ci=2*Math.PI*50,off=0;
  var h='<div class="chart-card glass"><div class="chart-title">'+esc(title)+'</div><div class="donut-chart"><svg viewBox="0 0 140 140">';
  data.forEach(function(d){var p=tot?d.v/tot:0,da=p*ci;h+='<circle cx="70" cy="70" r="50" stroke="'+d.clr+'" stroke-dasharray="'+da+' '+ci+'" stroke-dashoffset="-'+off+'" opacity=".85"/>';off+=da});
  h+='</svg><div class="donut-center"><div class="num">'+esc(tot)+'</div><div class="lbl">'+esc(t('إجمالي','Total'))+'</div></div></div><div class="donut-legend">';
  data.forEach(function(d){h+='<div class="donut-legend-item"><span class="dot" style="background:'+d.clr+'"></span>'+esc(d.l)+' ('+esc(d.v)+')</div>'});
  h+='</div></div>';return h}

  document.querySelectorAll('.wf-step').forEach(function(step){step.addEventListener('click',function(){var idx=parseInt(this.getAttribute('data-wf'));
    document.querySelectorAll('.wf-step').forEach(function(s,i){s.className='wf-step '+(i<idx?'done':i===idx?'current':'pending');s.querySelector('.wf-num').textContent=i<idx?'✓':(i+1)});

}

  b+='<p style="color:var(--text2);line-height:1.9;margin-bottom:14px">'+esc(t('هذا العرض لا يجمع الاسم أو الجوال أو البريد ولا يحفظ أي مدخلات. لطلب جلسة اكتشاف، انتقل إلى قناة التواصل العامة من الزر أدناه.','This showcase collects no name, phone, email, or form input. To request a discovery call, use the public contact channel below.'))+'</p>';
  b+='<div style="background:var(--accent-bg);border:1px solid rgba(99,102,241,.2);border-radius:var(--radius-sm);padding:12px 16px;font-size:.78rem;color:var(--accent2);font-weight:600;line-height:1.7">'+esc(t('لا ترسل كلمات مرور أو بيانات عملاء أو ملفات حساسة عبر قنوات التواصل العامة.','Do not send passwords, customer data, or sensitive files through public contact channels.'))+'</div>';
  var f='<button type="button" class="btn btn-outline" id="mc">'+esc(t('إلغاء','Cancel'))+'</button>';
  f+='<a class="btn btn-primary" href="https://t.me/PhantomSecSupport" target="_blank" rel="noopener noreferrer">📩 '+esc(t('فتح قناة التواصل','Open contact channel'))+'</a>';
  openModal(t('طلب تجربة المنصة','Request Platform Demo'),b,f);
  document.getElementById('mc').addEventListener('click',closeModal)});

document.getElementById('lang-btn').addEventListener('click',function(){isEn=!isEn;document.body.classList.toggle('en',isEn);
  document.documentElement.lang=isEn?'en':'ar';document.documentElement.dir=isEn?'ltr':'rtl';renderNav();renderContent();
  document.querySelectorAll('[data-ar]').forEach(function(el){el.style.display=isEn?'none':''});
  document.querySelectorAll('[data-en]').forEach(function(el){el.style.display=isEn?'':'none'})});

document.getElementById('theme-toggle').addEventListener('click',function(){
  var isLight=document.body.classList.toggle('light');
  this.innerHTML=isLight?('☀️ <span'+(isEn?' data-en':' data-ar')+'>'+esc(t('داكن','Dark'))+'</span>'):('🌙 <span'+(isEn?' data-en':' data-ar')+'>'+esc(t('فاتح','Light'))+'</span>');
});
document.getElementById('menu-toggle').addEventListener('click',function(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebar-overlay').classList.toggle('open')});
document.getElementById('sidebar-overlay').addEventListener('click',closeSB);
document.getElementById('modal-close').addEventListener('click',closeModal);
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal()});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal()});

(function(){var h=location.hash.replace('#','').toLowerCase();if(h==='phantomops')h='erp';if(h&&PLATFORMS[h]){currentPlatform=h;document.querySelectorAll('.sb-plat-btn').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-platform')===h)})}})();
bindPB();renderNav();renderContent();
document.querySelectorAll('[data-en]').forEach(function(el){el.style.display='none'});
})();
</script>
</body>
</html>
